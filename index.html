<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavan</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('bg.jpg') no-repeat center/cover;
color:white;
font-family:'Segoe UI',sans-serif;
overflow:hidden;
}

/* Dark overlay */
body::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
top:0;
left:0;
}

/* Glow effect */
body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,#ff416c,transparent);
filter:blur(120px);
animation:move 8s infinite alternate;
z-index:1;
}

@keyframes move{
0%{transform:translate(-100px,-100px);}
100%{transform:translate(100px,100px);}
}

.container{
position:relative;
z-index:2;
text-align:center;
max-width:600px;
}

img{
width:150px;
height:150px;
border-radius:50%;
box-shadow:0 0 40px #ff416c;
margin-bottom:20px;
object-fit:cover;
}

/* Typing */
#typing{
font-size:18px;
opacity:0.85;
min-height:60px;
}

.cursor{
display:inline-block;
width:2px;
height:18px;
background:white;
margin-left:5px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

/* Button */
button{
margin-top:30px;
padding:12px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ff416c;
}
</style>
</head>

<body>

<div class="container">

<img src="pavan.jpg">

<h1>Hi, I'm Pavan 👀</h1>

<div id="typing"></div><span class="cursor"></span>

<br>

<a href="https://instagram.com/pavanm_57" target="_blank">
<button>Enter My World 🔥</button>
</a>

</div>

<script>
let lines = [
"Engineer from NIT Kurukshetra 🎓",
"Government Auditor 🏛️",
"Focused on growth & discipline 🚀",
"And maybe… I'm different 😉"
];

let lineIndex = 0;
let charIndex = 0;

function typeEffect(){
if(lineIndex < lines.length){
if(charIndex < lines[lineIndex].length){
document.getElementById("typing").innerHTML += lines[lineIndex].charAt(charIndex);
charIndex++;
setTimeout(typeEffect,40);
}else{
setTimeout(()=>{
document.getElementById("typing").innerHTML += "<br>";
lineIndex++;
charIndex = 0;
typeEffect();
},800);
}
}
}

typeEffect();
</script>

</body>
</html>
